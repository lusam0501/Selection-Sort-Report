<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>氣泡排序法視覺化</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        .container { margin-top: 50px; display: flex; align-items: flex-end; height: 300px; gap: 5px; }
        .bar { width: 30px; background-color: #3498db; transition: 0.2s all; text-align: center; color: white; font-size: 12px; border-radius: 3px 3px 0 0; }
        .comparing { background-color: #e74c3c !important; }
        .sorted { background-color: #2ecc71 !important; }
        button { margin-top: 30px; padding: 10px 20px; font-size: 16px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 5px; }
        button:hover { background: #34495e; }
    </style>
</head>
<body>

    <h2>氣泡排序 (Bubble Sort) 視覺化</h2>
    <div class="container" id="visualizer"></div>
    <button onclick="startSort()">開始排序</button>

    <script>
        const data = [64, 34, 25, 12, 22, 11, 90, 45, 72];
        const container = document.getElementById('visualizer');

        // 初始化渲染
        function render(highlightIndices = [], sortedIndex = -1) {
            container.innerHTML = '';
            data.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val * 3}px`;
                bar.innerText = val;
                
                if (highlightIndices.includes(i)) bar.classList.add('comparing');
                if (sortedIndex !== -1 && i >= sortedIndex) bar.classList.add('sorted');
                
                container.appendChild(bar);
            });
        }

        // 延遲函式 (讓視覺化有動畫效果)
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function startSort() {
            let n = data.length;
            for (let i = 0; i < n - 1; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    // 1. 標示正在比較的兩個氣泡
                    render([j, j + 1], n - i);
                    await sleep(300);

                    if (data[j] > data[j + 1]) {
                        // 2. 交換數據
                        [data[j], data[j + 1]] = [data[j + 1], data[j]];
                        render([j, j + 1], n - i);
                        await sleep(300);
                    }
                }
            }
            render([], 0); // 全部變綠色表示完成
            alert("排序完成！");
        }

        render();
    </script>
</body>
</html>
